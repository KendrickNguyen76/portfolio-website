<nav class=navbar>
  <a href="{{ '/' | relative_url }}" class="navbar_home_text oswald_medium">Kendrick N.</a>
  
  <div class=navbar_right>
    {% for item in site.data.navigation %}
    <a href="{{ item.link | relative_url }}"
         class="navbar_text oswald_regular {% if page.url == item.link %}current{% endif %}"
         {% if item.name == "Resume" %}target="_blank" rel="noopener noreferrer"{% endif %}>
        {{ item.name }}
      </a>
    {% endfor %}
  </div>
</nav>
