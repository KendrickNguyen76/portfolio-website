---
layout: default
title: Contact Me
---

<div id="main_contact_div">
  <div class="container">
    <h1>Send me a message</h1>
    <form id="message_form" target="_blank" action="https://formsubmit.co/ab46af03912cb3126eb00cb2e6e046d5" method="POST">
      <div class="form-group">
        <div class="form-row">
          <div class="col">
            <input type="text" name="name" class="form-control" placeholder="Full Name" required>
          </div>
          <div class="col">
            <input type="email" name="email" class="form-control" placeholder="Email Address" required>
          </div>
        </div>
      </div>
      <div class="form-group">
        <textarea placeholder="Your Message" class="form-control" name="message" rows="10" required></textarea>
      </div>
      <button class="button" id="contact_button" type="submit">Submit Form</button>
    </form>
    <p>Form not working? Email me at: kendricknguyen76@gmail.com</p>
  </div>

  <div id="other_links">
    <h2>Connect with me on:</h2>
    <div id="social_media_icons">
      {% for social in site.data.social_media %}
        <a href="{{ social.link }}" target="_blank" rel="noopener noreferrer">
          <img class="icon_link" src="{{ social.image_path }}" alt="{{ social.alt_text }}"/>
        </a>
      {% endfor %}
    </div>
  </div>
</div>
